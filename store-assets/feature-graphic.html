<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>MausamChef - Feature Graphic</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
  }
  .container {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #FF6B35 0%, #E85A2A 50%, #D44A1A 100%);
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .container::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: 200px;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .left {
    flex: 1;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 2;
  }
  .app-name {
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1.1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }
  .tagline {
    font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.9);
    margin-top: 8px;
    font-weight: 400;
  }
  .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
    font-weight: 400;
  }
  .pills {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 8px 18px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 30px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
    background: rgba(255,255,255,0.1);
  }
  .right {
    width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    transform: rotate(-5deg);
  }
  .emoji-card {
    width: 90px;
    height: 90px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .emoji-card:nth-child(2) { transform: translateY(-10px); }
  .emoji-card:nth-child(5) { transform: translateY(-10px); }
  .emoji-card:nth-child(8) { transform: translateY(-10px); }
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <div class="app-name">MausamChef</div>
    <div class="tagline">Weather pe depend karta hai khaana!</div>
    <div class="subtitle">AI-Powered Food Recommendations</div>
    <div class="pills">
      <span class="pill">Weather-Based</span>
      <span class="pill">Hindi + English</span>
      <span class="pill">AI Powered</span>
    </div>
  </div>
  <div class="right">
    <div class="emoji-grid">
      <div class="emoji-card">☀️</div>
      <div class="emoji-card">🍛</div>
      <div class="emoji-card">🌧️</div>
      <div class="emoji-card">🍵</div>
      <div class="emoji-card">❄️</div>
      <div class="emoji-card">🍲</div>
      <div class="emoji-card">🌤️</div>
      <div class="emoji-card">🥗</div>
      <div class="emoji-card">🤖</div>
    </div>
  </div>
</div>
</body>
</html>
